<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="SANTINO B2B — Hệ thống đặt hàng sỉ">
<title>SANTINO B2B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="src/css/design-tokens.css">
<link rel="stylesheet" href="src/css/global.css">
<script>(function(){if(localStorage.getItem('santino_theme')==='dark')document.documentElement.classList.add('dark-theme')})();</script>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="material-symbols-outlined">diamond</span>SANTINO
    </div>
    <div class="nav-group">Nghiệp vụ</div>
    <a class="nav-item" href="#/order"   data-route="/order">
      <span class="material-symbols-outlined icon">shopping_bag</span>Đặt Hàng
    </a>
    <a class="nav-item" href="#/orders"  data-route="/orders">
      <span class="material-symbols-outlined icon">receipt_long</span>Danh Sách Đơn
    </a>
    <div class="nav-group">Danh mục</div>
    <a class="nav-item" href="#/products" data-route="/products">
      <span class="material-symbols-outlined icon">inventory_2</span>Sản Phẩm
    </a>
    <a class="nav-item" href="#/sizes"   data-route="/sizes">
      <span class="material-symbols-outlined icon">straighten</span>Size
    </a>
    <a class="nav-item" href="#/sku"     data-route="/sku">
      <span class="material-symbols-outlined icon">qr_code</span>Cấu hình SKU
    </a>
    <a class="nav-item" href="#/promos"  data-route="/promos">
      <span class="material-symbols-outlined icon">local_offer</span>CTKM
    </a>
    <div class="nav-bottom">
      <div class="nav-group">Hệ thống</div>
      <a class="nav-item" href="#/settings" data-route="/settings">
        <span class="material-symbols-outlined icon">settings</span>Cài đặt
      </a>
      <a class="nav-item" href="login.html">
        <span class="material-symbols-outlined icon">logout</span>Đăng xuất
      </a>
    </div>
  </aside>

  <!-- HEADER -->
  <header class="header">
    <div class="header-title" id="hdr-title">SANTINO B2B</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
        <span class="material-symbols-outlined">dark_mode</span>
      </button>
      <div class="avatar" title="Tài khoản">DL</div>
    </div>
  </header>

  <!-- PAGE CONTENT (Router inject vào đây) -->
  <main class="main" id="app-content" style="opacity:0">
    <div class="empty-state">
      <span class="material-symbols-outlined">hourglass_top</span>
      <p>Đang tải...</p>
    </div>
  </main>

</div>

<!-- TOAST (dùng chung toàn app) -->
<div class="toast" id="toast">
  <span class="material-symbols-outlined" style="color:var(--accent)">check_circle</span>
  <span id="toast-msg"></span>
</div>

<!-- DATA -->
<script src="src/data/product_master.js"></script>
<script src="src/data/size_groups.js"></script>
<script src="src/data/promotions.js"></script>
<!-- CORE -->
<script src="src/js/db.js"></script>
<script src="src/js/utils.js"></script>
<script src="src/js/core/router.js"></script>
<script src="src/js/core/app.js"></script>
</body>
</html>
