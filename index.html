<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Hệ thống đặt hàng sỉ">
  <title>Hệ thống đặt hàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="src/css/styles.bundle.css?v=76">
  <link rel="stylesheet" href="src/css/components/user-menu.css?v=76">
  <link rel="stylesheet" href="src/components/loading-spinner/loading-spinner.css">
  <script src="src/js/core/theme.js?v=76"></script>
</head>

<body>
  <div class="layout" id="main-layout">

    <!-- TOP NAVBAR -->
    <header class="navbar">
      <div class="nav-left">
        <button class="icon-btn menu-btn" onclick="toggleSidebar()" style="margin-right: 8px;">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="logo" style="cursor:pointer;" onclick="location.hash='#/order'">
          <img src="images/logo.png" alt="SANTINO" class="app-logo">
        </div>
        <div class="nav-links">
          <a class="nav-item" href="#/order" data-route="/order"><span
              class="material-symbols-outlined icon">shopping_bag</span><span data-i18n="nav.order">Đặt Hàng</span></a>
          <a class="nav-item" href="#/orders" data-route="/orders"><span
              class="material-symbols-outlined icon">receipt_long</span><span data-i18n="nav.orders">Danh Sách
              Đơn</span></a>
        </div>
      </div>
      <div class="nav-right">
        <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>

        <div id="user-menu-navbar"></div>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="logo"
        onclick="location.hash='#/order'; if(window.innerWidth <= 1024) { document.querySelector('.sidebar').classList.remove('show'); document.querySelector('.sidebar-overlay').classList.remove('show'); document.body.style.overflow=''; }"
        style="cursor:pointer;">
        <img src="images/logo.png" alt="SANTINO" class="app-logo" style="height: 40px;">
      </div>
      <div class="nav-group" data-i18n="nav.group.order">Hệ thống đặt hàng</div>
      <a class="nav-item" href="#/order" data-route="/order"><span
          class="material-symbols-outlined icon">shopping_bag</span><span data-i18n="nav.order">Đặt Hàng</span></a>
      <a class="nav-item" href="#/orders" data-route="/orders"><span
          class="material-symbols-outlined icon">receipt_long</span><span data-i18n="nav.orders">Đơn Hàng</span></a>

      <div class="nav-bottom">
        <a class="nav-item" href="#/settings" data-route="/settings"><span
            class="material-symbols-outlined icon">settings</span><span data-i18n="nav.settings">Cài đặt hiển
            thị</span></a>
        <a class="nav-item" href="login.html"><span class="material-symbols-outlined icon">logout</span><span
            data-i18n="nav.logout">Đăng xuất</span></a>
      </div>
    </aside>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- HEADER (Cho Sidebar Mode) -->
    <header class="header" id="sidebar-header" style="display:none; height: var(--header-h);">
      <button class="icon-btn menu-btn" onclick="toggleSidebar()">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="header-title" id="hdr-title"></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>
        <div id="user-menu-sidebar-header"></div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="main" id="app-content" style="opacity:0">
      <div class="empty-state">
        <span class="material-symbols-outlined">hourglass_top</span>
        <p>Đang tải...</p>
      </div>
    </main>

  </div>

  <script>
    // LAYOUT INIT
    (function () {
      var mode = localStorage.getItem('santino_layout') || 'navbar';
      var layout = document.getElementById('main-layout');
      layout.classList.add('mode-' + mode);
      if (mode === 'sidebar') {
        document.getElementById('sidebar-header').style.display = 'flex';
      }
    })();
  </script>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="material-symbols-outlined" style="color:var(--accent)">check_circle</span>
    <span id="toast-msg"></span>
  </div>

  <!-- BUNDLED JS -->
  <script src="env.js?v=76"></script>
  <script src="src/js/components/user-menu.js?v=76"></script>
  <script src="src/components/loading-spinner/LoadingSpinner.js"></script>
  <script src="src/js/app.bundle.js?v=76"></script>
  <script>
    function toggleSidebar() {
      var sidebar = document.querySelector('.sidebar');
      sidebar.classList.toggle('show');
      document.querySelector('.sidebar-overlay').classList.toggle('show');

      var isOpening = sidebar.classList.contains('show');
      if (window.innerWidth <= 1024) {
        document.body.style.overflow = isOpening ? 'hidden' : '';
      }

      // Phát âm thanh khi MỞ sidebar (không phát khi đóng)
      if (isOpening && typeof SoundUtils !== 'undefined' && SoundUtils.playSidebarOpen) {
        SoundUtils.playSidebarOpen();
      }
    }
    // Auto-close menu when clicking nav items on mobile
    document.querySelectorAll('.sidebar .nav-item').forEach(el => {
      el.addEventListener('click', () => {
        if (window.innerWidth <= 1024) {
          document.querySelector('.sidebar').classList.remove('show');
          document.querySelector('.sidebar-overlay').classList.remove('show');
          document.body.style.overflow = '';
        }
      });
    });
  </script>
</body>

</html>
