<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="SANTINO B2B — Hệ thống đặt hàng sỉ">
  <title>SANTINO B2B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">
  <!-- BUNDLED CSS -->
  <link rel="stylesheet" href="src/css/styles.bundle.css?v=6">
  <script>(function () { if (localStorage.getItem('santino_theme') === 'dark') document.documentElement.classList.add('dark-theme') })();</script>
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo" style="padding-top: 16px; margin-bottom: 24px;">
        <img src="images/logo.png" alt="SANTINO" class="app-logo" style="height: 40px; object-fit: contain;">
        <div style="font-size: 12px; opacity: 0.6; font-weight: 500; margin-top: 4px;">Wholesale Portal</div>
      </div>
      
      <button class="btn btn-primary" style="width: 100%; margin-bottom: 24px; justify-content: center; gap: 10px;" onclick="window.location.hash='#/order'">
        <span class="material-symbols-outlined">add</span> <span data-i18n="btn.new_order">Tạo đơn mới</span>
      </button>


      <a class="nav-item active" href="#/order" data-route="/order">
        <span class="material-symbols-outlined icon">shopping_cart</span><span data-i18n="nav.order">Đặt hàng</span>
      </a>
      <a class="nav-item" href="#/orders" data-route="/orders">
        <span class="material-symbols-outlined icon">receipt_long</span><span data-i18n="nav.orders">Danh sách đơn</span>
      </a>
      <a class="nav-item" href="#/products" data-route="/products">
        <span class="material-symbols-outlined icon">inventory_2</span><span data-i18n="nav.products">Sản phẩm</span>
      </a>
      <a class="nav-item" href="#/sizes" data-route="/sizes">
        <span class="material-symbols-outlined icon">straighten</span><span data-i18n="nav.sizes">Size</span>
      </a>
      <a class="nav-item" href="#/sku" data-route="/sku">
        <span class="material-symbols-outlined icon">qr_code</span><span data-i18n="nav.sku">Cấu hình SKU</span>
      </a>
      <a class="nav-item" href="#/promos" data-route="/promos">
        <span class="material-symbols-outlined icon">local_offer</span><span data-i18n="nav.promos">CTKM</span>
      </a>

      <div class="nav-bottom" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <a class="nav-item" href="#/settings" data-route="/settings">
          <span class="material-symbols-outlined icon">settings</span><span data-i18n="nav.settings">Cài đặt</span>
        </a>
        <a class="nav-item" href="login.html">
          <span class="material-symbols-outlined icon">logout</span><span data-i18n="nav.logout">Đăng xuất</span>
        </a>
      </div>
    </aside>

    <!-- HEADER -->
    <header class="header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="icon-btn menu-btn" onclick="toggleMobileMenu()">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <div style="display:flex; align-items:center; gap:8px">
            <div class="header-title" id="hdr-title" style="font-size: 20px; font-weight: 800;">Đặt Hàng</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-save-draft" class="btn btn-ghost btn-sm" onclick="OrderPage.saveOrder()" style="display:none; background: var(--surface); border: 1px solid var(--border); font-weight: 700;">
          <span class="material-symbols-outlined" style="font-size: 18px;">save</span> Lưu nháp
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>
        <div class="avatar" title="Tài khoản">DL</div>
      </div>
    </header>

    <!-- PAGE CONTENT (Router inject vào đây) -->
    <main class="main" id="app-content" style="opacity:0">
      <div class="empty-state">
        <span class="material-symbols-outlined">hourglass_top</span>
        <p>Đang tải...</p>
      </div>
    </main>

  </div>

  <!-- MOBILE SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="mobile-overlay" onclick="toggleMobileMenu()"></div>

  <!-- GLOBAL PAGE FOOTER (Dùng cho trang Đặt Hàng) -->
  <footer class="page-footer" id="global-footer" style="display: none;">
    <div class="footer-stats">
      <div class="f-stat">
        <div class="f-label" data-i18n="order.total.qty">Tổng số lượng</div>
        <div class="f-val"><span id="f-total-qty">0</span> SP</div>
      </div>
      <div class="f-stat">
        <div class="f-label" data-i18n="order.total.money">Tổng tiền</div>
        <div class="f-val highlight" id="f-total-money">0đ</div>
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-accent btn-lg" onclick="OrderPage.previewOrder()" style="padding: 14px 40px; border-radius: 12px; font-weight: 800; gap: 12px;">
        <span data-i18n="btn.preview">Xem trước</span> <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </footer>

  <!-- TOAST (dùng chung toàn app) -->
  <div class="toast" id="toast">
    <span class="material-symbols-outlined" style="color:var(--accent)">check_circle</span>
    <span id="toast-msg"></span>
  </div>



  <!-- BUNDLED JS (Core + Data + Components) -->
  <script src="src/js/app.bundle.js"></script>
  <script>
    function toggleMobileMenu() {
      document.querySelector('.sidebar').classList.toggle('show');
      document.getElementById('mobile-overlay').classList.toggle('show');
    }
    // Auto-close menu when clicking nav items on mobile
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          document.querySelector('.sidebar').classList.remove('show');
          document.getElementById('mobile-overlay').classList.remove('show');
        }
      });
    });
  </script>
</body>

</html>
