<!-- ═══════════════════════════════════════
   QUẢN LÝ DANH MỤC MENU — menus.html
   ═══════════════════════════════════════ -->

<div style="width: 100%; animation: slideUp 0.3s ease forwards;">
  <!-- CÂY MENU (UINestedTabs) -->
  <div class="card" style="padding: 0; min-height: 420px; overflow: hidden; display: flex; flex-direction: column;">
    <div style="padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <h3 style="margin: 0; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
        <span class="material-symbols-outlined" style="color: var(--primary); font-size: 20px;">account_tree</span>
        Cấu trúc Menu hệ thống
      </h3>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span class="badge badge-primary" id="menus-count-badge" style="font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 6px; margin-right: 8px;">0 Menu</span>
        <button class="btn btn-outline btn-sm" id="btn-refresh-menus" style="padding: 6px 12px; font-size: 13px; display: flex; align-items: center; gap: 4px; height: 32px;">
          <span class="material-symbols-outlined" style="font-size: 16px;">refresh</span> Làm mới
        </button>
        <button class="btn btn-primary btn-sm" id="btn-add-parent-menu" style="padding: 6px 12px; font-size: 13px; display: flex; align-items: center; gap: 4px; height: 32px;">
          <span class="material-symbols-outlined" style="font-size: 16px;">add</span> Thêm Nhóm Cha
        </button>
      </div>
    </div>
    <div id="menus-nested-tabs-container" style="padding: 20px; flex: 1;">
      <!-- UINestedTabs sẽ được mount vào đây từ JS -->
      <div id="menus-tabs-loading" style="text-align: center; padding: 60px 0; color: var(--muted);">
        <span class="material-symbols-outlined" style="font-size: 40px; opacity: 0.2; display: block; margin-bottom: 12px;">menu_book</span>
        Đang tải danh mục...
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL Thêm / Sửa Menu ══════════════════════════════════ -->
<div id="modal-menu-form" class="modal-overlay" style="display: none;">
  <div class="modal" style="width: 520px; max-width: 95%; max-height: 90vh; display: flex; flex-direction: column; padding: 0; overflow: hidden;">
    <div class="modal-hdr" style="padding: 16px 20px; border-bottom: 1px solid var(--border);">
      <h3 id="modal-menu-title" style="margin: 0; font-size: 16px; font-weight: 700;">Thêm mới Menu</h3>
      <button class="btn-icon" id="btn-close-modal"><span class="material-symbols-outlined">close</span></button>
    </div>

    <div class="modal-body" style="padding: 24px; overflow-y: auto; flex: 1;">
      <form id="menu-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="hidden" id="menu-is-edit" value="0">
        <input type="hidden" id="menu-old-id" value="">

        <!-- Menu ID -->
        <div class="form-group">
          <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">
            Menu ID <span style="color: var(--danger)">*</span>
            <span style="font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 6px;">
              (2 số = Nhóm cha | 4+ số = Menu con)
            </span>
          </label>
          <input type="text" id="menu-id" class="ui-input" required placeholder="VD: 15 hoặc 1501" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
        </div>

        <!-- Parent -->
        <div class="form-group">
          <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Nhóm Cha (Parent)</label>
          <select id="menu-parent" class="ui-input" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
            <option value="">— Là Nhóm Cha (Root) —</option>
          </select>
        </div>

        <!-- Tên VN / EN -->
        <div style="display: flex; gap: 16px;">
          <div class="form-group" style="flex: 1;">
            <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Tên Tiếng Việt <span style="color: var(--danger)">*</span></label>
            <input type="text" id="menu-label" class="ui-input" required placeholder="VD: Báo cáo" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
          </div>
          <div class="form-group" style="flex: 1;">
            <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Tên Tiếng Anh</label>
            <input type="text" id="menu-en" class="ui-input" placeholder="VD: Report" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
          </div>
        </div>

        <!-- Phụ đề (SubTitle) -->
        <div class="form-group">
          <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Phụ đề (SubTitle)</label>
          <input type="text" id="menu-subtitle" class="ui-input" placeholder="VD: Quản lý danh sách nhân sự" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
        </div>

        <!-- Tên Form & Form Key -->
        <div style="display: flex; gap: 16px;">
          <div class="form-group" style="flex: 2;">
            <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Tên Form hệ thống <span style="color: var(--danger)">*</span></label>
            <input type="text" id="menu-formname" class="ui-input" placeholder="VD: WB_BaocaoDoanhThu" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
          </div>
          <div class="form-group" style="flex: 1;">
            <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">Form Key</label>
            <input type="text" id="menu-formkey" class="ui-input" placeholder="VD: Report" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
          </div>
        </div>

        <!-- URL / Tham số -->
        <div class="form-group">
          <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">URL / Tham số</label>
          <input type="text" id="menu-urlpara" class="ui-input" placeholder="VD: ?type=doanhthu" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);">
        </div>

        <!-- Icon -->
        <div class="form-group">
          <label style="font-weight: 600; margin-bottom: 6px; font-size: 13px;">
            Icon
            <span style="font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px;">(Material Symbols)</span>
          </label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="menu-icon" class="ui-input" style="flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; outline: none; background: var(--surface); color: var(--text);"
              placeholder="VD: bar_chart, home, settings..."
              oninput="document.getElementById('menu-icon-preview').textContent = this.value || 'label'">
            <span class="material-symbols-outlined" id="menu-icon-preview"
              style="font-size: 28px; color: var(--primary); flex-shrink: 0; transition: all 0.2s;">
              label
            </span>
          </div>
          <div id="modal-icon-picker-grid"
            style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: 8px; max-height: 100px; overflow-y: auto;">
            <!-- JS Rendered Icons -->
          </div>
        </div>

        <!-- Ẩn / Hiện -->
        <div style="margin-top: 8px; padding: 12px 14px; background: rgba(239, 68, 68, 0.06); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.15);">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;">
            <input type="checkbox" id="menu-is-disable" style="width: 16px; height: 16px; cursor: pointer;">
            <span style="color: var(--danger); font-weight: 500; font-size: 13px; display: flex; align-items: center; gap: 4px;">
              <span class="material-symbols-outlined" style="font-size: 16px;">visibility_off</span>
              Đóng băng (Ẩn) Menu này khỏi hệ thống
            </span>
          </label>
        </div>
      </form>
    </div>

    <div class="modal-actions" style="padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); display: flex; justify-content: flex-end; gap: 10px; margin: 0;">
      <button class="btn btn-ghost" id="btn-cancel-modal">Hủy</button>
      <button class="btn btn-primary" id="btn-save-menu" style="display: flex; align-items: center; gap: 6px;">
        <span class="material-symbols-outlined" style="font-size: 16px;">save</span>
        Lưu Thông Tin
      </button>
    </div>
  </div>
</div>

<style>

    padding: 12px 8px !important;
  }

    max-width: 100% !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    border-right: none !important;
    border-bottom: 2px solid var(--border) !important;
    padding: 0 0 8px 0 !important;
    scrollbar-width: none;
  }
  .ui-nested-tabs__sidebar::-webkit-scrollbar { display: none; }
  
  .ui-nested-tabs__sidebar-parent {
    display: contents !important;
  }
  .ui-nested-tabs__child-list.open {
    display: contents !important;
  }
  
  .ui-nested-tab-parent-btn--v, .ui-nested-tab-child-btn--v {
    flex: 0 0 auto !important;
    margin-right: 8px !important;
    border-radius: 6px !important;
    padding: 6px 10px !important;
    font-size: 12px !important;
    border: 1px solid var(--border) !important;
    margin-bottom: 0 !important;
  }
  .ui-nested-tab-child-btn--v {
    padding-left: 10px !important;
  }
  
  .ui-nested-tab-parent-btn--v.active, .ui-nested-tab-child-btn--v.active {
    background: var(--primary) !important;
    color: #fff !important;
    border-color: var(--primary) !important;
  }
  .ui-nested-tab-parent-btn--v.active .material-symbols-outlined, 
  .ui-nested-tab-child-btn--v.active .material-symbols-outlined {
    color: #fff !important;
  }
  .ui-nested-tab-parent-btn--v.active::before,
  .ui-nested-tab-child-btn--v.active::before {
    display: none !important;
  }
  
  .ui-nested-parent-chevron { display: none !important; }

  .ui-nested-tabs__vertical-content {
    padding: 12px 0 0 0 !important;
  }

  .data-table th, .data-table td {
    padding: 6px 4px !important;
    font-size: 11px !important;
  }
  .data-table th {
    padding: 4px 2px !important;
  }
}
</style>
