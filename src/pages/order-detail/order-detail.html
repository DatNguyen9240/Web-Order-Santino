<div class="page-hdr" style="flex-wrap: wrap; gap: 10px;">
  <div style="flex: 1; min-width: 0;">
    <h2 id="detail-title" style="word-wrap: break-word; font-size: clamp(18px, 5vw, 24px); margin: 0; line-height: 1.3;">Chi Tiết Đơn</h2>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="Router.go('/orders')" style="white-space: nowrap; flex-shrink: 0;">
    <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">arrow_back</span><span
      data-i18n="btn.back">Quay lại</span>
  </button>
</div>
<div class="card" id="detail-info" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap:15px 20px; align-items: flex-start;"></div>
<div class="tbl-wrap" style="background: #fff; box-shadow: var(--shadow-sm); border: 1px solid var(--border)">
  <table style="background: #fff">
    <thead style="background: #fff">
      <tr style="background: #fff">
        <th style="background: #fff" data-i18n="order.col.name">Tên hàng 2</th>
        <th style="background: #fff">SKU</th>
        <th style="background: #fff" data-i18n="product.col.name">Tên hàng hóa</th>
        <th style="background: #fff" data-i18n="nav.sizes">Size</th>
        <th style="background: #fff" data-i18n="order.col.qty">SL</th>
        <th style="background: #fff" data-i18n="order.col.price">Đơn giá</th>
        <th style="background: #fff" data-i18n="order.total.money">Thành tiền</th>
      </tr>
    </thead>
    <tbody id="detail-body" style="background: #fff"></tbody>
  </table>
</div>
