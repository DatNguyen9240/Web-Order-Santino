<div class="page-hdr">
  <div>
    <h2>🛒 Đặt Hàng</h2>
    <p>Tạo đơn hàng sỉ theo ma trận size</p>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="OrderPage.clearOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">delete</span>Hủy đơn
    </button>
    <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">save</span>Lưu đơn
    </button>
  </div>
</div>

<!-- Header đơn -->
<div class="card">
  <div class="form-grid">
    <div class="form-group"><label>Số CT</label><input id="o-so-ct" class="locked" readonly></div>
    <div class="form-group"><label>Ngày CT</label><input id="o-ngay" type="date"></div>
    <div class="form-group"><label>Chi nhánh</label>
      <select id="o-chi-nhanh">
        <option>Trụ sở Hà Nội</option>
        <option>Chi nhánh HCM</option>
      </select>
    </div>
    <div class="form-group"><label>Nhân viên KD</label><input id="o-nv" placeholder="Tên nhân viên..."></div>
    <div class="form-group"><label>CTKM <span style="color:var(--accent)">*</span></label>
      <select id="o-ctbh"></select>
    </div>
    <div class="form-group span2"><label>Ghi chú chung</label>
      <input id="o-note" placeholder="Ghi chú áp dụng toàn đơn...">
    </div>
  </div>
</div>

<!-- Ma trận size -->
<div class="card">
  <div class="matrix-search" style="margin-bottom:16px">
    <div class="autocomplete-wrap" style="flex:1">
      <input id="ac-input" placeholder="🔍 Nhập Tên hàng 2 (VD: AMC545S659)..." autocomplete="off"
        oninput="OrderPage.acSearch(this.value)" onkeydown="if(event.key==='Enter')OrderPage.addProductRow()">
      <div class="autocomplete-dropdown" id="ac-list"></div>
    </div>
    <button class="btn btn-primary" onclick="OrderPage.addProductRow()">
      <span class="material-symbols-outlined" style="font-size:16px">add</span>Thêm
    </button>
  </div>
  <div class="tbl-wrap">
    <table id="matrix-table">
      <thead id="matrix-head"></thead>
      <tbody id="matrix-body">
        <tr>
          <td colspan="20" class="empty-state">
            <span class="material-symbols-outlined">table_chart</span>
            Tìm và thêm sản phẩm để bắt đầu nhập số lượng
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="matrix-footer">
    <div class="total-info">
      Tổng: <span id="total-qty">0</span> SP &nbsp;·&nbsp; <span id="total-money">0đ</span>
    </div>
    <button class="btn btn-accent" onclick="OrderPage.previewOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">visibility</span>Xem trước
    </button>
  </div>
</div>

<!-- Modal: Preview -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="width:min(800px,95vw)">
    <div class="modal-hdr">
      <h3>👁 Xem Trước Đơn Hàng</h3>
      <button class="btn-icon" onclick="closeModal('modal-preview')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <div id="preview-info"
      style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px"></div>
    <div class="tbl-wrap" style="max-height:360px;overflow-y:auto">
      <table>
        <thead>
          <tr>
            <th>Tên hàng 2</th>
            <th>SKU</th>
            <th>Size</th>
            <th>SL</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
            <th>CTBH</th>
            <th>Ghi chú</th>
          </tr>
        </thead>
        <tbody id="preview-body"></tbody>
        <tfoot>
          <tr style="font-weight:700;background:var(--bg)">
            <td colspan="3" style="padding:10px 12px">Tổng cộng</td>
            <td id="pv-qty" style="padding:10px 12px"></td>
            <td></td>
            <td id="pv-money" style="padding:10px 12px;color:var(--accent)"></td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-preview')">Đóng</button>
      <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
        <span class="material-symbols-outlined" style="font-size:16px">save</span>Lưu đơn
      </button>
    </div>
  </div>
</div>
