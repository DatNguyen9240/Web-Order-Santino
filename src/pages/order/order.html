<div class="page-hdr">
  <div>
    <h2 data-i18n="hdr.order">Đặt Hàng</h2>
    <p data-i18n="hdr.order.desc">Tạo đơn hàng sỉ theo ma trận size</p>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="OrderPage.clearOrder()">
      <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">delete</span><span data-i18n="btn.cancel">Hủy
        đơn</span>
    </button>
    <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
      <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">save</span><span data-i18n="btn.save">Lưu
        đơn</span>
    </button>
  </div>
</div>

<!-- Header đơn -->
<div class="card" style="margin-bottom: 24px">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px; cursor: pointer;"
    onclick="document.getElementById('header-info-body').style.display = document.getElementById('header-info-body').style.display === 'none' ? 'grid' : 'none'; this.querySelector('.icon-toggle').textContent = document.getElementById('header-info-body').style.display === 'none' ? 'expand_more' : 'expand_less';">
    <div style="font-weight: 700; font-size: calc(16px * var(--text-scale, 1)); color: var(--primary);">
      <span class="material-symbols-outlined"
        style="vertical-align: bottom; font-size: calc(20px * var(--text-scale, 1)); margin-right: 4px;">receipt_long</span>
      <span data-i18n="order.info">Thông tin chung</span>
    </div>
    <span class="material-symbols-outlined icon-toggle" style="color:var(--muted)">expand_less</span>
  </div>
  <div class="form-grid" id="header-info-body">
    <div class="form-group"><label data-i18n="order.no">Số CT</label><input id="o-so-ct" class="locked" readonly></div>
    <div class="form-group"><label data-i18n="order.date">Ngày CT</label><input id="o-ngay" type="date"></div>
    <div class="form-group"><label data-i18n="order.branch">Chi nhánh</label>
      <select id="o-chi-nhanh">
        <option value="Trụ sở Hà Nội" data-i18n="order.branch.hn">Trụ sở Hà Nội</option>
        <option value="Chi nhánh HCM" data-i18n="order.branch.hcm">Chi nhánh HCM</option>
      </select>
    </div>
    <div class="form-group"><label data-i18n="order.staff">Nhân viên KD</label><input id="o-nv"
        placeholder="Tên nhân viên..." data-i18n-placeholder="order.staff.placeholder"></div>
    <div class="form-group"><label><span data-i18n="order.promo">CTKM</span> <span
          style="color:var(--accent)">*</span></label>
      <select id="o-ctbh"></select>
    </div>
    <div class="form-group span2"><label data-i18n="order.note">Ghi chú chung</label>
      <input id="o-note" placeholder="Ghi chú áp dụng toàn đơn..." data-i18n-placeholder="order.note.placeholder">
    </div>
  </div>
</div>
<!-- Thông tin khách hàng -->
<div class="card" style="margin-bottom: 24px">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px; cursor: pointer;"
    onclick="document.getElementById('customer-info-body').style.display = document.getElementById('customer-info-body').style.display === 'none' ? 'grid' : 'none'; this.querySelector('.icon-toggle').textContent = document.getElementById('customer-info-body').style.display === 'none' ? 'expand_more' : 'expand_less';">
    <div style="font-weight: 700; font-size: calc(16px * var(--text-scale, 1)); color: var(--primary);">
      <span class="material-symbols-outlined"
        style="vertical-align: bottom; font-size: calc(20px * var(--text-scale, 1)); margin-right: 4px;">person</span>
      <span data-i18n="order.customer_info">Thông tin Khách hàng</span>
    </div>
    <span class="material-symbols-outlined icon-toggle" style="color:var(--muted)">expand_less</span>
  </div>
  <div class="form-grid" id="customer-info-body">
    <div class="form-group span2"><label><span data-i18n="order.customer_name">Tên khách hàng / Đại lý</span> <span
          style="color:var(--accent)">*</span></label><input id="o-kh-ten" placeholder="Nhập tên khách hàng..."
        data-i18n-placeholder="order.customer_name.placeholder"></div>
    <div class="form-group"><label data-i18n="order.customer_phone">Số điện thoại</label><input id="o-kh-sdt"
        placeholder="Nhập số điện thoại..." data-i18n-placeholder="order.customer_phone.placeholder"></div>
    <div class="form-group span3"><label data-i18n="order.customer_address">Địa chỉ giao hàng</label><input id="o-kh-dc"
        placeholder="Nhập địa chỉ giao hàng..." data-i18n-placeholder="order.customer_address.placeholder"></div>
  </div>
</div>

<!-- Ma trận size -->
<div class="card">
  <div class="matrix-search" style="margin-bottom:16px; display:flex; gap:8px;">
    <div class="autocomplete-wrap" style="flex:1; position:relative;">
      <div class="search-wrapper" style="width: 100%;">
        <span class="material-symbols-outlined">search</span>
        <input id="ac-input" placeholder="Nhập Tên hàng 2 (VD: AMC545S659)..."
          data-i18n-placeholder="order.search.placeholder" autocomplete="off" oninput="OrderPage.acSearch(this.value)"
          onfocus="OrderPage.acSearch(this.value)" onclick="OrderPage.acSearch(this.value)"
          onkeydown="if(event.key==='Enter')OrderPage.addProductRow()">
      </div>
      <div class="autocomplete-dropdown" id="ac-list" style="z-index: 9999;"></div>
    </div>
    <button id="btn-multi-mode" class="btn btn-ghost" onclick="OrderPage.toggleMultiMode()" title="Chế độ chọn nhiều"
      style="padding:0 12px; border: 1px solid var(--border); display:flex; align-items:center; justify-content:center;">
      <span class="material-symbols-outlined" id="icon-multi-mode"
        style="font-size: calc(20px * var(--text-scale, 1)); color:var(--muted)">checklist</span>
    </button>
  </div>
  <div id="matrix-container" style="display:flex; flex-direction:column; gap:16px;">
    <div class="empty-state" style="background:var(--surface); border-radius:12px; padding:32px; border:1px solid var(--border);">
      <span class="material-symbols-outlined">table_chart</span>
      <span data-i18n="order.search.empty">Tìm và thêm sản phẩm để bắt đầu nhập số lượng</span>
    </div>
  </div>
  <div class="matrix-footer">
    <div class="total-info">
      <span data-i18n="order.total.qty">Tổng SP</span>: <span id="total-qty" style="color: var(--primary);">0</span>
      <span style="margin: 0 12px; color: var(--border-strong);">|</span>
      <span data-i18n="order.total.money">Thành tiền</span>: <span id="total-money" style="color: var(--accent); font-weight: 800; font-size: calc(22px * var(--text-scale, 1));">0đ</span>
    </div>
    <button class="btn btn-accent" onclick="OrderPage.previewOrder()">
      <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">visibility</span><span data-i18n="btn.preview">Xem
        trước</span>
    </button>
  </div>
</div>

<!-- Modal: Preview -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="width:min(800px,95vw)">
    <div class="modal-hdr">
      <h3 data-i18n="order.preview.title">👁 Xem Trước Đơn Hàng</h3>
      <button class="btn-icon" onclick="closeModal('modal-preview')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <div id="preview-info"
      style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size: calc(13px * var(--text-scale, 1));margin-bottom:12px"></div>
    <div class="tbl-wrap" style="max-height:360px;overflow-y:auto">
      <table>
        <thead id="preview-head">
        </thead>
        <tbody id="preview-body"></tbody>
        <tfoot id="preview-foot">
        </tfoot>
      </table>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-preview')" data-i18n="btn.close">Đóng</button>
      <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
        <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">save</span><span data-i18n="btn.save">Lưu
          đơn</span>
      </button>
    </div>
  </div>
</div>
