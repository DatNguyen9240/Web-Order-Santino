<div class="page-hdr">
  <div>
    <h2 data-i18n="hdr.order">Đặt Hàng</h2>
    <p data-i18n="hdr.order.desc">Tạo đơn hàng sỉ theo ma trận size</p>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="OrderPage.clearOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">delete</span><span data-i18n="btn.cancel">Hủy đơn</span>
    </button>
    <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">save</span><span data-i18n="btn.save">Lưu đơn</span>
    </button>
  </div>
</div>

<!-- Header đơn -->
<div class="card">
  <div class="form-grid">
    <div class="form-group"><label data-i18n="order.no">Số CT</label><input id="o-so-ct" class="locked" readonly></div>
    <div class="form-group"><label data-i18n="order.date">Ngày CT</label><input id="o-ngay" type="date"></div>
    <div class="form-group"><label data-i18n="order.branch">Chi nhánh</label>
      <select id="o-chi-nhanh">
        <option data-i18n="order.branch.hn">Trụ sở Hà Nội</option>
        <option data-i18n="order.branch.hcm">Chi nhánh HCM</option>
      </select>
    </div>
    <div class="form-group"><label data-i18n="order.staff">Nhân viên KD</label><input id="o-nv" placeholder="Tên nhân viên..." data-i18n-placeholder="order.staff.placeholder"></div>
    <div class="form-group"><label><span data-i18n="order.promo">CTKM</span> <span style="color:var(--accent)">*</span></label>
      <select id="o-ctbh"></select>
    </div>
    <div class="form-group span2"><label data-i18n="order.note">Ghi chú chung</label>
      <input id="o-note" placeholder="Ghi chú áp dụng toàn đơn..." data-i18n-placeholder="order.note.placeholder">
    </div>
  </div>
</div>

<!-- Ma trận size -->
<div class="card">
  <div class="matrix-search" style="margin-bottom:16px">
    <div class="autocomplete-wrap" style="flex:1">
      <div class="search-wrapper" style="width: 100%;">
        <span class="material-symbols-outlined">search</span>
        <input id="ac-input" placeholder="Nhập Tên hàng 2 (VD: AMC545S659)..." data-i18n-placeholder="order.search.placeholder" autocomplete="off"
          oninput="OrderPage.acSearch(this.value)" onfocus="OrderPage.acSearch(this.value)" onclick="OrderPage.acSearch(this.value)" onkeydown="if(event.key==='Enter')OrderPage.addProductRow()">
      </div>
      <div class="autocomplete-dropdown" id="ac-list"></div>
    </div>
    <button id="btn-multi-mode" class="btn btn-ghost" onclick="OrderPage.toggleMultiMode()" title="Chế độ chọn nhiều" style="padding:0 12px; border: 1px solid var(--border)">
      <span class="material-symbols-outlined" id="icon-multi-mode" style="font-size:20px; color:var(--muted)">checklist</span>
    </button>
  </div>
  <div class="tbl-wrap">
    <table id="matrix-table">
      <thead id="matrix-head"></thead>
      <tbody id="matrix-body">
        <tr>
          <td colspan="20" class="empty-state">
            <span class="material-symbols-outlined">table_chart</span>
            <span data-i18n="order.search.empty">Tìm và thêm sản phẩm để bắt đầu nhập số lượng</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="matrix-footer">
    <div class="total-info">
      <span data-i18n="order.total.qty">Tổng SP</span>: <span id="total-qty" style="color: var(--primary);">0</span> &nbsp;·&nbsp; <span id="total-money" style="color: var(--primary);">0đ</span>
    </div>
    <button class="btn btn-accent" onclick="OrderPage.previewOrder()">
      <span class="material-symbols-outlined" style="font-size:16px">visibility</span><span data-i18n="btn.preview">Xem trước</span>
    </button>
  </div>
</div>

<!-- Modal: Preview -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="width:min(800px,95vw)">
    <div class="modal-hdr">
      <h3 data-i18n="order.preview.title">👁 Xem Trước Đơn Hàng</h3>
      <button class="btn-icon" onclick="closeModal('modal-preview')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <div id="preview-info"
      style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px"></div>
    <div class="tbl-wrap" style="max-height:360px;overflow-y:auto">
      <table>
        <thead>
          <tr>
            <th data-i18n="order.col.name">Tên hàng 2</th>
            <th>SKU</th>
            <th data-i18n="nav.sizes">Size</th>
            <th data-i18n="order.col.qty">SL</th>
            <th data-i18n="order.col.price">Đơn giá</th>
            <th data-i18n="order.total.money">Thành tiền</th>
            <th data-i18n="order.col.promo">CTBH</th>
            <th data-i18n="order.note">Ghi chú</th>
          </tr>
        </thead>
        <tbody id="preview-body"></tbody>
        <tfoot>
          <tr style="font-weight:700;background:var(--bg)">
            <td colspan="3" style="padding:10px 12px" data-i18n="order.total.label">Tổng cộng</td>
            <td id="pv-qty" style="padding:10px 12px"></td>
            <td></td>
            <td id="pv-money" style="padding:10px 12px;color:var(--accent)"></td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-preview')" data-i18n="btn.close">Đóng</button>
      <button class="btn btn-accent" onclick="OrderPage.saveOrder()">
        <span class="material-symbols-outlined" style="font-size:16px">save</span><span data-i18n="btn.save">Lưu đơn</span>
      </button>
    </div>
  </div>
</div>
