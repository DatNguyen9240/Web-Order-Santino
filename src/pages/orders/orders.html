<style>
  .orders-filter {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    width: 100%;
  }

  .orders-date-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 320px;
    /* Bé lại trên màn hình to */
    flex-shrink: 0;
  }

  .orders-date-grid .form-group {
    margin-bottom: 0;
    /* Bỏ margin bottom mặc định */
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .orders-date-grid .form-group label {
    font-size: calc(12px * var(--text-scale, 1));
    color: var(--muted);
    font-weight: 500;
  }

  @media (max-width: 768px) {
    .orders-filter {
      flex-direction: column;
      align-items: stretch;
    }

    .orders-date-grid {
      max-width: 100%;
      min-width: 100%;
      width: 100%;
    }
  }
</style>
<div class="container-wide">
  <div class="page-hdr">
    <div>
      <h2><span data-i18n="hdr.orders">Danh Sách Đơn Hàng</span></h2>
      <p data-i18n="hdr.orders.desc">Lịch sử và trạng thái đơn</p>
    </div>
  </div>
  <div class="orders-filter" style="margin-bottom: 20px;">
    <div class="orders-date-grid">
      <div id="orders-from-container"></div>
      <div id="orders-to-container"></div>
    </div>
    <div class="search-wrapper" style="width: 250px; max-width: 100%; flex: none; display: none; position: relative;"
      id="sub-customer-filter-wrapper">
      <span class="material-symbols-outlined"
        style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted);">person</span>
      <select id="orders-filter-subordinate"
        style="width: 100%; height: 42px; padding: 0 36px 0 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; font-weight: 500; cursor: pointer; appearance: none; -webkit-appearance: none; -moz-appearance: none; font-size: 14px; box-shadow: var(--shadow-sm); transition: all 0.2s ease;"
        onchange="OrdersPage.filter()">
        <option value="">-- Tất cả khách hàng --</option>
      </select>
      <span class="material-symbols-outlined"
        style="position: absolute; right: 12px; left: auto; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted);">expand_more</span>
    </div>
    <div class="search-wrapper" style="width: 300px; max-width: 100%; flex: none;">
      <span class="material-symbols-outlined">search</span>
      <input id="orders-search" placeholder="Tìm số CT hoặc Khách hàng..."
        data-i18n-placeholder="orders.search.placeholder" oninput="OrdersPage.filter()">
    </div>
  </div>
  <div id="orders-grid-container" style="height: 550px; width: 100%;"></div>
  <div id="orders-pagination" style="margin-top: 16px; display: flex; justify-content: center;"></div>
</div>
