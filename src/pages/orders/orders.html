<div class="page-hdr">
  <div><h2><span data-i18n="hdr.orders">Danh Sách Đơn Hàng</span></h2><p data-i18n="hdr.orders.desc">Lịch sử và trạng thái đơn</p></div>
  <div class="orders-filter" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap">
    <div style="display:flex; align-items:center; gap:8px;">
      <label style="font-size:calc(12px * var(--text-scale,1)); color:var(--muted)">Từ ngày:</label>
      <input type="date" id="orders-from" onchange="OrdersPage.filter()" style="border:1px solid var(--border); border-radius:8px; padding:8px 12px; background:var(--surface); font-family:inherit; outline:none; transition: border-color 0.2s;">
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <label style="font-size:calc(12px * var(--text-scale,1)); color:var(--muted)">Đến ngày:</label>
      <input type="date" id="orders-to" onchange="OrdersPage.filter()" style="border:1px solid var(--border); border-radius:8px; padding:8px 12px; background:var(--surface); font-family:inherit; outline:none; transition: border-color 0.2s;">
    </div>
    <div class="search-wrapper" style="width: auto; flex: 1; min-width: 250px;">
      <span class="material-symbols-outlined">search</span>
      <input id="orders-search" placeholder="Tìm số CT hoặc Khách hàng..." data-i18n-placeholder="orders.search.placeholder" oninput="OrdersPage.filter()">
    </div>
  </div>
</div>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th data-i18n="table.col.no">Số CT</th><th data-i18n="table.col.date">Ngày CT</th><th data-i18n="table.col.branch">Chi nhánh</th><th data-i18n="table.col.promo">CTKM</th>
      <th data-i18n="table.col.total_qty">Tổng SP</th><th data-i18n="table.col.total_money">Tổng tiền</th><th data-i18n="table.col.note">Ghi chú</th><th data-i18n="table.col.action">Thao tác</th>
    </tr></thead>
    <tbody id="orders-body">
      <tr><td colspan="8" class="empty-state">
        <span class="material-symbols-outlined">receipt_long</span><span data-i18n="orders.search.empty">Chưa có đơn hàng nào</span>
      </td></tr>
    </tbody>
  </table>
</div>
