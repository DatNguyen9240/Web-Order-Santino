<style>
  .orders-filter {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    width: 100%;
  }
  .orders-date-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 320px; /* Bé lại trên màn hình to */
    flex-shrink: 0;
  }
  .orders-date-grid .form-group {
    margin-bottom: 0; /* Bỏ margin bottom mặc định */
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .orders-date-grid .form-group label {
    font-size: calc(12px * var(--text-scale, 1));
    color: var(--muted);
    font-weight: 500;
  }
  @media (max-width: 768px) {
    .orders-filter {
      flex-direction: column;
      align-items: stretch;
    }
    .orders-date-grid {
      max-width: 100%;
      min-width: 100%;
      width: 100%;
    }
  }
</style>
<div class="container-wide">
<div class="page-hdr">
  <div><h2><span data-i18n="hdr.orders">Danh Sách Đơn Hàng</span></h2><p data-i18n="hdr.orders.desc">Lịch sử và trạng thái đơn</p></div>
</div>
<div class="orders-filter" style="margin-bottom: 20px;">
  <div class="orders-date-grid">
    <div id="orders-from-container"></div>
    <div id="orders-to-container"></div>
  </div>
  <div class="search-wrapper" style="width: 300px; max-width: 100%; flex: none;">
    <span class="material-symbols-outlined">search</span>
    <input id="orders-search" placeholder="Tìm số CT hoặc Khách hàng..." data-i18n-placeholder="orders.search.placeholder" oninput="OrdersPage.filter()">
  </div>
</div>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th data-i18n="table.col.no">Số CT</th><th data-i18n="table.col.date">Ngày CT</th><th data-i18n="table.col.branch">Chi nhánh</th><th data-i18n="table.col.promo">CTKM</th>
      <th data-i18n="table.col.total_qty">Tổng SP</th><th data-i18n="table.col.total_money">Tổng tiền</th><th data-i18n="table.col.note">Ghi chú</th><th data-i18n="table.col.action">Thao tác</th>
    </tr></thead>
    <tbody id="orders-body">
      <tr><td colspan="8" class="empty-state">
        <span class="material-symbols-outlined">receipt_long</span><span data-i18n="orders.search.empty">Chưa có đơn hàng nào</span>
      </td></tr>
    </tbody>
  </table>
</div>
<div id="orders-pagination" style="margin-top: 16px; display: flex; justify-content: flex-end;"></div>
</div>
