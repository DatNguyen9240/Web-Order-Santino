<div style="display: flex; gap: 16px; flex-wrap: wrap; animation: slideUp 0.3s ease forwards;">
  <!-- CỘT TRÁI: DANH SÁCH NHÓM QUYỀN -->
  <div style="flex: 0 0 250px; min-width: 200px;">
    <div class="card" style="padding: 0; overflow: hidden;">
      <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg);">
        <h3 style="margin: 0; font-size: 15px; font-weight: 600;">Nhóm quyền</h3>
      </div>
      <div id="role-list-container" style="max-height: calc(100vh - 200px); overflow-y: auto; padding: 8px;">
        <!-- JS GENERATED ROLE LIST -->
      </div>
    </div>
  </div>

  <!-- CỘT PHẢI: CHI TIẾT PHÂN QUYỀN -->
  <div style="flex: 1 1 500px; min-width: 300px;">
    <div class="card d-flex flex-column" style="min-height: 400px; padding: 0; overflow: hidden;">
      <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; justify-content: space-between; align-items: center;">
        <h3 style="display: flex; align-items: center; gap: 8px; margin: 0; font-size: 15px; font-weight: 600;">
          <span class="material-symbols-outlined" style="font-size: 20px;">account_tree</span>
          Chi tiết Phân quyền: <span id="current-role-name" style="color: var(--primary); font-weight: 600;"></span>
        </h3>
        <div>
          <button class="btn btn-outline btn-sm" id="btn-sync-permission" style="padding: 6px 12px; font-size: 12px; white-space: nowrap;">Đồng Bộ Menu</button>
        </div>
      </div>
      <div style="overflow: auto; max-height: calc(100vh - 200px); -webkit-overflow-scrolling: touch;">
        <table class="data-table" id="permission-tree-table" style="margin: 0; width: 100%; min-width: 950px; border-collapse: collapse; table-layout: fixed;">
          <colgroup>
            <col style="width: 34%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
            <col style="width: 6%;">
          </colgroup>
          <thead>
            <tr>
              <th style="text-align: left; padding: 10px; border-bottom: 2px solid var(--border);">Cấu trúc Phân quyền</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Xem</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Thêm</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Sửa</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Xóa</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Quản lý</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);">Admin</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);" title="Khóa Tự Động">Khóa TĐ</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);" title="Ẩn Số Tiền">Ẩn T.Tiền</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);" title="Khóa Chứng Từ">Khóa CT</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);" title="Mở Chứng Từ">Mở CT</th>
              <th style="font-size: 11px; text-align: center; padding: 10px; border-bottom: 2px solid var(--border);" title="Xuất Excel">Xuất Excel</th>
            </tr>
          </thead>
          <tbody style="font-size: 13px;">
            <!-- JS GENERATED TREE ROWS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
