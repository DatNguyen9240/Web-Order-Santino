<div class="page-hdr" style="display: none;">
  <div>
    <h2><span data-i18n="hdr.products">Quản Lý Sản Phẩm</span></h2>
    <p data-i18n="hdr.products.desc">CRUD Tên hàng 2 — nguồn sinh SKU</p>
  </div>
</div>
<div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:16px; align-items:center;">
  <div class="search-wrapper" style="flex:1; min-width: 250px;">
    <span class="material-symbols-outlined">search</span>
    <input id="product-search" placeholder="Tìm tên hàng 2..." data-i18n-placeholder="products.search.placeholder" oninput="ProductsPage.render()">
  </div>
  <select id="product-filter-form" style="min-width:140px; padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;font-weight:500;box-shadow:var(--shadow-sm);" onchange="ProductsPage.render()">
    <option value="">Tất cả Form</option>
    <option>AMC</option>
    <option>ARC</option>
  </select>
  <button class="btn btn-primary" onclick="ProductsPage.openModal()" style="white-space: nowrap; height: 42px;">
    <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">add</span><span data-i18n="btn.add">Thêm</span>
  </button>
</div>
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th data-i18n="table.col.name2">Tên hàng 2</th>
        <th data-i18n="table.col.product_group">Nhóm hàng</th>
        <th data-i18n="table.col.form">Form</th>
        <th data-i18n="table.col.design_color">Design/Màu</th>
        <th data-i18n="table.col.size_group">Nhóm size</th>
        <th data-i18n="table.col.price">Đơn giá</th>
        <th data-i18n="table.col.product_name">Tên hàng hóa</th>
        <th data-i18n="table.col.status">Trạng thái</th>
        <th data-i18n="table.col.action">Thao tác</th>
      </tr>
    </thead>
    <tbody id="products-body"></tbody>
  </table>
</div>

<!-- Modal: Sản phẩm -->
<div class="modal-overlay" id="modal-product">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="pm-title">Thêm Sản Phẩm</h3>
      <button class="btn-icon" onclick="closeModal('modal-product')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="pm-id">
    <div class="form-grid">
      <div class="form-group span2"><label>Tên hàng 2 *</label><input id="pm-ten" placeholder="VD: AMC545S659"></div>
      <div class="form-group"><label>Nhóm hàng</label>
        <select id="pm-nhom">
          <option>SKU101</option>
          <option>SKU102</option>
        </select>
      </div>
      <div class="form-group"><label>Form</label>
        <select id="pm-form">
          <option>AMC</option>
          <option>ARC</option>
          <option>AMD</option>
        </select>
      </div>
      <div class="form-group"><label>Design</label><input id="pm-design" placeholder="S659"></div>
      <div class="form-group"><label>Màu</label><input id="pm-mau" placeholder="S659-Xanh navy"></div>
      <div class="form-group"><label>Nhóm size</label><select id="pm-nhom-size"></select></div>
      <div class="form-group"><label>Đơn giá</label><input id="pm-gia" type="number" placeholder="545000"></div>
      <div class="form-group span2"><label>Tên hàng hóa</label><input id="pm-tenhh" placeholder="Áo sơ mi-AMC545S659">
      </div>
      <div class="form-group"><label>Tên nhóm hàng</label>
        <select id="pm-tennhom">
          <option>SỔ MI NGẮN TAY</option>
          <option>SỔ MI DÀI TAY</option>
          <option>QUẦN ÂU</option>
        </select>
      </div>
      <div class="form-group"><label>Trạng thái</label>
        <select id="pm-ngung">
          <option value="false">Đang bán</option>
          <option value="true">Ngừng bán</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-product')">Hủy</button>
      <button class="btn btn-primary" onclick="ProductsPage.save()">Lưu</button>
    </div>
  </div>
</div>
