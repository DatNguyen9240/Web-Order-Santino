<div class="page-hdr">
  <div>
    <h2><span data-i18n="hdr.promos">Quản Lý CTKM</span></h2>
    <p data-i18n="hdr.promos.desc">Chương trình khuyến mãi / bán hàng</p>
  </div>
  <button class="btn btn-primary" onclick="PromosPage.openModal()">
    <span class="material-symbols-outlined" style="font-size:16px">add</span><span data-i18n="btn.add">Thêm CTKM</span>
  </button>
</div>
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th data-i18n="table.col.promo_code">Mã CTBH</th>
        <th data-i18n="table.col.promo_name">Tên CTBH</th>
        <th data-i18n="table.col.desc">Mô tả</th>
        <th data-i18n="table.col.status">Trạng thái</th>
        <th data-i18n="table.col.action">Thao tác</th>
      </tr>
    </thead>
    <tbody id="promos-body"></tbody>
  </table>
</div>

<!-- Modal: CTKM -->
<div class="modal-overlay" id="modal-promo">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="prom-title">Thêm CTKM</h3>
      <button class="btn-icon" onclick="closeModal('modal-promo')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="prom-id">
    <div class="form-grid">
      <div class="form-group"><label>Mã CTBH *</label><input id="prom-ma" placeholder="CKCB"></div>
      <div class="form-group"><label>Tên CTBH *</label><input id="prom-ten" placeholder="Chiết khấu cơ bản"></div>
      <div class="form-group span2"><label>Mô tả</label><input id="prom-mota" placeholder="Mô tả ngắn..."></div>
      <div class="form-group"><label>Trạng thái</label>
        <select id="prom-active">
          <option value="true">Đang áp dụng</option>
          <option value="false">Tạm dừng</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-promo')">Hủy</button>
      <button class="btn btn-primary" onclick="PromosPage.save()">Lưu</button>
    </div>
  </div>
</div>
