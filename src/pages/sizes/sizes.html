<div class="card" style="padding: 16px;">
  <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
    <button class="btn btn-primary" onclick="SizesPage.openModal()" style="gap:8px;">
      <span class="material-symbols-outlined" style="font-size:20px">add</span> Thêm size
    </button>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="table.col.size">MÃ KÍCH CỠ</th>
          <th data-i18n="table.col.size_name">TÊN KÍCH CỠ</th>
          <th style="text-align:center" data-i18n="table.col.size_group">NHÓM KÍCH CỠ</th>
          <th style="text-align:center" data-i18n="table.col.action">THAO TÁC</th>
        </tr>
      </thead>
      <tbody id="sizes-body"></tbody>
    </table>
  </div>
</div>

<!-- Modal: Size -->
<div class="modal-overlay" id="modal-size">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="sm-title">Thêm Size</h3>
      <button class="btn-icon" onclick="closeModal('modal-size')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="sm-id">
    <div class="form-grid">
      <div class="form-group"><label>Size (số) *</label><input id="sm-size" type="number" placeholder="40"></div>
      <div class="form-group"><label>Tên size</label><input id="sm-ten" placeholder="40"></div>
      <div class="form-group"><label>Nhóm size *</label><input id="sm-nhom" placeholder="Nhóm 3"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-size')">Hủy</button>
      <button class="btn btn-primary" onclick="SizesPage.save()">Lưu</button>
    </div>
  </div>
</div>
