<div class="page-hdr">
  <div><h2>📏 Quản Lý Size</h2><p>CRUD size và nhóm size</p></div>
  <button class="btn btn-primary" onclick="SizesPage.openModal()">
    <span class="material-symbols-outlined" style="font-size:16px">add</span>Thêm size
  </button>
</div>
<div class="tbl-wrap">
  <table>
    <thead><tr><th>Size</th><th>Tên size</th><th>Nhóm size</th><th>Thao tác</th></tr></thead>
    <tbody id="sizes-body"></tbody>
  </table>
</div>

<!-- Modal: Size -->
<div class="modal-overlay" id="modal-size">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="sm-title">Thêm Size</h3>
      <button class="btn-icon" onclick="closeModal('modal-size')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="sm-id">
    <div class="form-grid">
      <div class="form-group"><label>Size (số) *</label><input id="sm-size" type="number" placeholder="40"></div>
      <div class="form-group"><label>Tên size</label><input id="sm-ten" placeholder="40"></div>
      <div class="form-group"><label>Nhóm size *</label><input id="sm-nhom" placeholder="Nhóm 3"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-size')">Hủy</button>
      <button class="btn btn-primary" onclick="SizesPage.save()">Lưu</button>
    </div>
  </div>
</div>
