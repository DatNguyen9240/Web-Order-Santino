<div class="page-hdr">
  <div>
    <h2><span data-i18n="hdr.sizes">Quản Lý Size</span></h2>
    <p data-i18n="hdr.sizes.desc">CRUD size và nhóm size</p>
  </div>
  <div style="display: flex; gap: 8px; align-items: center;">
    <button class="btn btn-primary" onclick="SizesPage.openModal()">
      <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">add</span><span data-i18n="btn.add">Thêm size</span>
    </button>
    <button class="btn btn-secondary" onclick="SizesPage.copySize()">
      <span class="material-symbols-outlined" style="font-size: calc(16px * var(--text-scale, 1))">content_copy</span><span>Sao chép</span>
    </button>
  </div>
</div>
<div id="sizes-grid-container" style="height: 400px; width: 100%;"></div>

<!-- Modal: Size -->
<div class="modal-overlay" id="modal-size">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="sm-title">Thêm Size</h3>
      <button class="btn-icon" onclick="closeModal('modal-size')"><span
          class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="sm-id">
    <div class="form-grid">
      <div class="form-group"><label>Size (số) *</label><input id="sm-size" type="number" placeholder="40"></div>
      <div class="form-group"><label>Tên size</label><input id="sm-ten" placeholder="40"></div>
      <div class="form-group"><label>Nhóm size *</label><input id="sm-nhom" placeholder="Nhóm 3"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-size')">Hủy</button>
      <button class="btn btn-primary" onclick="SizesPage.save()">Lưu</button>
    </div>
  </div>
</div>
